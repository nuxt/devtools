ignoreWorkspaceRootCheck: true
strictPeerDependencies: false
autoInstallPeers: true
minimumReleaseAgeExclude:
  - '@devframes/hub@0.6.0'
  - '@devframes/plugin-inspect@0.6.0'
  - '@devframes/plugin-messages@0.6.0'
  - '@devframes/plugin-terminals@0.6.0'
  - '@rolldown/debug@1.0.3'
  - '@vitejs/devtools-kit@0.4.0'
  - '@vitejs/devtools-rolldown@0.4.0'
  - '@vitejs/devtools@0.4.0'
  - '@vue/compiler-core@3.5.39'
  - '@vue/compiler-dom@3.5.39'
  - '@vue/compiler-sfc@3.5.39'
  - '@vue/compiler-ssr@3.5.39'
  - '@vue/reactivity@3.5.39'
  - '@vue/runtime-core@3.5.39'
  - '@vue/runtime-dom@3.5.39'
  - '@vue/server-renderer@3.5.39'
  - '@vue/shared@3.5.39'
  - devframe@0.6.0
  - vue@3.5.39
  - '@turbo/darwin-64@2.9.16'
  - '@turbo/darwin-arm64@2.9.16'
  - '@turbo/linux-64@2.9.16'
  - '@turbo/linux-arm64@2.9.16'
  - '@turbo/windows-64@2.9.16'
  - '@turbo/windows-arm64@2.9.16'
  - turbo@2.9.16
  - vue-router@5.1.0
  - vite-plugin-inspect@12.0.0-beta.3
resolutionMode: highest
shamefullyHoist: true
shellEmulator: true
trustPolicy: no-downgrade
trustPolicyExclude:
  - 'tinyexec@1.2.0 || 1.2.1 || 1.2.2'

packages:
  - packages/**
  - playgrounds/**

allowBuilds:
  '@parcel/watcher': true
  better-sqlite3: true
  cypress: true
  esbuild: true
  json-editor-vue: true
  simple-git-hooks: true
  unrs-resolver: true
  vue-demi: true

overrides:
  '@nuxt/devtools': workspace:*
  # Force a single `@vitejs/devtools-kit` across the tree. `vite-plugin-inspect`
  # still pins `^0.3.1` (which pulls devframe/hub 0.5.2), but only uses the
  # version-agnostic `defineRpcFunction` passthrough, so deduping onto 0.4.0
  # keeps devframe 0.6 as the single devtools runtime.
  '@vitejs/devtools-kit': catalog:types
  chokidar: catalog:buildtools
  esbuild: catalog:buildtools
  rollup: catalog:buildtools
  semver: catalog:prod
  typescript: catalog:cli
  unimport: catalog:types
  vite: catalog:buildtools
  # `@vitejs/devtools@0.4` requires vue `^3.5.39`; dedupe the whole tree onto a
  # single vue (and thus a single `@vue/compiler-sfc`) to avoid duplicate-import
  # SFC codegen errors from mixed compiler versions.
  vue: catalog:frontend
  vue-tsc: catalog:cli
