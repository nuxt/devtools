ignoreWorkspaceRootCheck: true
strictPeerDependencies: false
autoInstallPeers: true
minimumReleaseAgeExclude:
  - '@vitejs/devtools-kit@0.4.0 || 0.4.1'
  - '@vitejs/devtools-rolldown@0.4.0 || 0.4.1'
  - '@vitejs/devtools@0.4.0 || 0.4.1'
  - vite-plugin-inspect@12.0.2
  - '@devframes/hub@0.6.1'
  - devframe@0.6.1
  - verkit@0.1.2
resolutionMode: highest
shamefullyHoist: true
shellEmulator: true
trustPolicy: no-downgrade
trustPolicyExclude:
  - 'tinyexec@1.2.0 || 1.2.1 || 1.2.2'

packages:
  - packages/**
  - playgrounds/**

allowBuilds:
  '@parcel/watcher': true
  better-sqlite3: true
  cypress: true
  esbuild: true
  json-editor-vue: true
  simple-git-hooks: true
  unrs-resolver: true
  vue-demi: true

overrides:
  # NOTE: these must be literal ranges, not `catalog:` refs. pnpm's
  # `catalog:` protocol inside `overrides` isn't understood by pnpm 9.x
  # (e.g. the pnpm major Vercel falls back to when corepack isn't active),
  # which silently drops the whole `overrides` config and desyncs the
  # lockfile, breaking `pnpm install --frozen-lockfile`. Keep these in sync
  # with the matching catalog entries below by hand.
  '@devframes/hub': ^0.6.1
  '@nuxt/devtools': workspace:*
  chokidar: ^5.0.0
  devframe: ^0.6.1
  esbuild: ^0.28.1
  rollup: ^4.62.2
  semver: ^7.8.5
  typescript: ^6.0.3
  unimport: ^6.3.0
  # `@vitejs/devtools@0.4` has no Vite 8.1-compatible release yet (peer
  # `vite: *`, still built against 8.0): under Vite 8.1's reworked
  # WebSocket-upgrade handling, its crossws-based RPC socket ends up calling
  # `server.handleUpgrade()` twice on the same SSR socket, killing the
  # DevTools socket and every SSR playground e2e. Pin to 8.0.x until
  # `@vitejs/devtools` ships 8.1 support.
  vite: ~8.0.14
  # `@vitejs/devtools@0.4` requires vue `^3.5.39`; dedupe the whole tree onto a
  # single vue (and thus a single `@vue/compiler-sfc`) to avoid duplicate-import
  # SFC codegen errors from mixed compiler versions.
  vue: ^3.5.39
  vue-tsc: ^3.3.7
