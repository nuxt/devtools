ignoreWorkspaceRootCheck: true
strictPeerDependencies: false
autoInstallPeers: true
minimumReleaseAgeExclude:
  - '@devframes/hub'
  - '@devframes/json-render'
  - '@devframes/plugin-a11y'
  - '@devframes/plugin-data-inspector'
  - '@devframes/plugin-code-server'
  - '@devframes/plugin-inspect'
  - '@devframes/plugin-messages'
  - '@devframes/plugin-terminals'
  - '@vitejs/devtools-kit'
  - '@vitejs/devtools-rolldown'
  - '@vitejs/devtools'
  - devframe
  - verkit@0.1.2
  - vite-plugin-inspect@12.0.2
resolutionMode: highest
shamefullyHoist: true
shellEmulator: true
trustPolicy: no-downgrade
trustPolicyExclude:
  - 'tinyexec@1.2.0 || 1.2.1 || 1.2.2'

packages:
  - packages/**
  - playgrounds/**
  - '!playgrounds/**/.output/**'

allowBuilds:
  '@parcel/watcher': true
  better-sqlite3: true
  cypress: true
  esbuild: true
  json-editor-vue: true
  simple-git-hooks: true
  unrs-resolver: true
  vue-demi: true

overrides:
  # NOTE: these must be literal ranges, not `catalog:` refs. pnpm's
  # `catalog:` protocol inside `overrides` isn't understood by pnpm 9.x
  # (e.g. the pnpm major Vercel falls back to when corepack isn't active),
  # which silently drops the whole `overrides` config and desyncs the
  # lockfile, breaking `pnpm install --frozen-lockfile`. Keep these in sync
  # with the matching catalog entries below by hand.
  '@devframes/hub': ^0.7.11
  '@nuxt/devtools': workspace:*
  '@vue/compiler-core': 3.5.39
  '@vue/compiler-dom': 3.5.39
  '@vue/shared': 3.5.39
  chokidar: ^5.0.0
  devframe: ^0.7.11
  esbuild: ^0.28.1
  rollup: ^4.62.2
  semver: ^7.8.5
  typescript: ^6.0.3
  unimport: ^6.3.1
  # `@vitejs/devtools@0.4.2` still fails under Vite 8.1's reworked
  # WebSocket-upgrade handling: its crossws-based RPC socket ends up calling
  # `server.handleUpgrade()` twice on the same SSR socket, killing the
  # DevTools socket and every SSR playground e2e. Pin to 8.0.x until
  # `@vitejs/devtools` ships working 8.1 support.
  vite: ~8.0.16
  # `@vitejs/devtools@0.4.2` requests Vue 3.5.40, but mixing its compiler
  # internals with the 3.5.39 runtime generates duplicate-import SFC errors.
  vue: 3.5.39
  vue-tsc: ^3.3.7
