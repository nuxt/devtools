ignoreWorkspaceRootCheck: true
strictPeerDependencies: false
autoInstallPeers: true
minimumReleaseAgeExclude:
  - '@devframes/hub'
  - '@devframes/json-render'
  - '@devframes/plugin-data-inspector'
  - '@devframes/plugin-code-server'
  - '@devframes/plugin-inspect'
  - '@devframes/plugin-messages'
  - '@devframes/plugin-terminals'
  - '@vitejs/devtools-kit'
  - '@vitejs/devtools-rolldown'
  - '@vitejs/devtools'
  - devframe
  - verkit@0.1.2
  - vite-plugin-inspect@12.0.2
resolutionMode: highest
shamefullyHoist: true
shellEmulator: true
trustPolicy: no-downgrade
trustPolicyExclude:
  - 'tinyexec@1.2.0 || 1.2.1 || 1.2.2'

packages:
  - packages/**
  - playgrounds/**
  - '!playgrounds/**/.output/**'

allowBuilds:
  '@parcel/watcher': true
  better-sqlite3: true
  cypress: true
  esbuild: true
  json-editor-vue: true
  simple-git-hooks: true
  unrs-resolver: true
  vue-demi: true

refs:
  devframe: &devframe ^0.7.13
  nuxt: &nuxt ^4.5.0
  shiki: &shiki ^4.3.1
  unocss: &unocss ^66.7.5
  # `@vitejs/devtools@0.4.2` still fails under Vite 8.1's reworked
  # WebSocket-upgrade handling: its crossws-based RPC socket ends up calling
  # `server.handleUpgrade()` twice on the same SSR socket, killing the
  # DevTools socket and every SSR playground e2e. Pin to 8.0.x until
  # `@vitejs/devtools` ships working 8.1 support.
  vite: &vite ~8.0.16

  vite-devtools: &vite-devtools ^0.4.7
  vue: &vue ^3.5.40
  vue-devtools: &vue-devtools ^8.1.5
  vueuse: &vueuse ^14.3.0
overrides:
  '@devframes/hub': *devframe
  '@devframes/json-render': *devframe
  '@devframes/plugin-code-server': *devframe
  '@devframes/plugin-data-inspector': *devframe
  '@devframes/plugin-inspect': *devframe
  '@devframes/plugin-messages': *devframe
  '@devframes/plugin-terminals': *devframe
  '@nuxt/devtools': workspace:*
  '@vue/compiler-core': *vue
  '@vue/compiler-dom': *vue
  '@vue/shared': *vue
  chokidar: ^5.0.0
  devframe: *devframe
  esbuild: ^0.28.1
  rollup: ^4.62.2
  semver: ^7.8.5
  typescript: ^6.0.3
  unimport: ^6.3.1
  vite: *vite
  vue: *vue
  vue-tsc: ^3.3.8
