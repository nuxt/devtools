name: e2e

on:
  push:
    branches:
      - main
  pull_request:
    paths-ignore:
      - 'docs/**'

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
      - run: npm install -g corepack@latest
      - run: corepack enable
      - run: pnpm install
      - run: pnpm build
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm exec playwright install --with-deps chromium
      # tab-pinia/tab-seo use `../../local`, which spawns a Nuxt dev subprocess
      # for the devtools client. On CI runners:
      #  - dev mode: the subprocess can't compile the inner client app within
      #    the test's 90s budget, so dev tests time out.
      #  - built mode: `nuxt build` itself hangs after one playground because
      #    a stale subprocess from the previous build holds something that
      #    blocks the next build from progressing.
      # Restrict CI to the `empty` playground (which uses prebuilt
      # `@nuxt/devtools` directly, no subprocess). Local `pnpm test:e2e` still
      # exercises the full matrix.
      - run: PW_PROJECT='empty:dev' pnpm exec playwright test --config tests/e2e/playwright.config.ts
      - run: pnpm -C playgrounds/empty exec nuxt build
      - run: PW_PROJECT='empty:built' pnpm exec playwright test --config tests/e2e/playwright.config.ts
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 7
