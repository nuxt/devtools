name: e2e

on:
  push:
    branches:
      - main
  pull_request:
    paths-ignore:
      - 'docs/**'

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
      - run: npm install -g corepack@latest
      - run: corepack enable
      - run: pnpm install
      - run: pnpm build
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm exec playwright install --with-deps chromium
      # tab-pinia/tab-seo use `../../local` which spawns a Nuxt dev subprocess
      # for the devtools client. On CI cold-start that subprocess can't compile
      # the inner client app within the test's 90s budget, so we restrict the
      # dev-mode coverage on CI to the `empty` playground (which uses the
      # pre-built `@nuxt/devtools` and doesn't need the subprocess). Built-mode
      # runs across all three playgrounds — that path doesn't depend on the
      # subprocess.
      - run: PW_PROJECT='empty:dev' pnpm exec playwright test --config tests/e2e/playwright.config.ts
      - run: pnpm test:e2e:prebuild
      - run: PW_PROJECT='*:built' pnpm exec playwright test --config tests/e2e/playwright.config.ts
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 7
