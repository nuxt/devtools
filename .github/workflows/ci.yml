name: ci

on:
  push:
    branches:
      - main
  # PR CI handled by autofix.yml
  # pull_request:
  #   branches:
  #     - main

jobs:
  ci:
    permissions:
      id-token: write
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: latest
          cache: pnpm
      - run: npm install -g corepack@latest
      - run: corepack enable
      - run: pnpm install
      # Generate the client Nuxt app's `.nuxt` types (incl. its `@nuxt/eslint`
      # config, which the root ESLint config imports) before linting.
      - run: pnpm dev:prepare
      - run: pnpm lint
      - run: pnpm build
      - run: pnpm typecheck
      - name: Release Nightly
        if: github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip-release]')
        run: ./scripts/release-nightly.sh
