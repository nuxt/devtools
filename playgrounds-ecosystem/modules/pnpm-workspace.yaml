packages:
  - .

strictPeerDependencies: false
autoInstallPeers: true
shamefullyHoist: true

allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  sharp: true
  vue-demi: true

minimumReleaseAgeExclude:
  - '@nuxt/scripts@1.3.1'
catalog:
  '@nuxt/content': ^3.15.0
  '@nuxt/devtools': ^4.0.0-alpha.7
  '@nuxt/fonts': ^0.14.0
  '@nuxt/image': ^2.0.0
  '@nuxt/scripts': ^1.3.1
  '@types/node': ^26.1.1
  nuxt: ^4.4.8
  nuxt-og-image: ^6.7.2
